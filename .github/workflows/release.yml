name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: openpaw-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: openpaw-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: openpaw-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: openpaw-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Rename artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/openpaw ${{ matrix.artifact_name }}
        
      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/openpaw.exe ${{ matrix.artifact_name }}
        
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Display structure of downloaded files
        run: ls -R
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openpaw-linux-x86_64/openpaw-linux-x86_64
            openpaw-macos-x86_64/openpaw-macos-x86_64
            openpaw-macos-arm64/openpaw-macos-arm64
            openpaw-windows-x86_64.exe/openpaw-windows-x86_64.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
